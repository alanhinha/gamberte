<style>
  #loading {
    position: fixed;
    inset: 0;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    color: white;
    font-family: sans-serif;
  }

  .bar {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    overflow: hidden;
    border-radius: 2px;
    margin-top: 15px;
  }

  .bar::before {
    content: "";
    display: block;
    height: 100%;
    width: 50%;
    background: #22c55e;
    animation: loading 1.2s infinite;
  }

  @keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }
</style>

<div id="loading">
  <div>Đang khởi động hệ thống...</div>
  <div class="bar"></div>
</div>

<iframe 
  src="https://script.google.com/macros/s/AKfycbwuZCqL6ZF5VPrCQz0tbqdMDFoscu6R1um-EVoFAFAUHcJbEtH6u8UzR9kygqvD523D/exec"
  onload="document.getElementById('loading').style.display='none'">
</iframe>
